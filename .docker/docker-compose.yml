version: '3'

services:
  api:
    build: ./.docker/api
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis

  ui:
    build: ./.docker/ui
    environment:
      - NODE_ENV=development
    ports:
      - "3001:3001"
    depends_on:
      - api

  db:
    image: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ollamas
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis
    volumes:
      - redis-data:/data

volumes:
  db-data:
  redis-data: