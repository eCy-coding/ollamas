# ollamas SaaS gateway — Kubernetes manifests (Faz 10D).
# Deploys the gateway/SaaS API ONLY. The macOS host-bridge (macos_terminal,
# write_host_file, etc.) is host-specific and DOES NOT run in K8s — see README.md.
# Apply: kubectl apply -f deploy/k8s/ollamas.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollamas-config
data:
  NODE_ENV: "production"
  PORT: "3000"
  SAAS_ENFORCE: "1"
  MCP_EXPOSE_TIERS: "safe"        # narrow: no host/privileged host tools in cloud
  LOG_LEVEL: "info"
  DB_POOL_SIZE: "5"              # pg connections per replica (Faz 12/13)
  SHUTDOWN_GRACE_MS: "10000"     # graceful drain budget on SIGTERM (Faz 13A)
---
apiVersion: v1
kind: Secret
metadata:
  name: ollamas-secrets
type: Opaque
stringData:
  # Replace these / source from an external secret manager.
  SAAS_ADMIN_TOKEN: "change-me"
  STRIPE_API_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  REDIS_URL: ""
  # Postgres for multi-replica scale (Faz 12/13). Empty → falls back to a
  # per-pod sqlite file (NOT shared — set this for replicas > 1).
  DATABASE_URL: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollamas
  labels: { app: ollamas }
spec:
  replicas: 2
  selector:
    matchLabels: { app: ollamas }
  template:
    metadata:
      labels: { app: ollamas }
    spec:
      # Give in-flight /mcp streams + webhook deliveries time to drain on SIGTERM
      # before the kubelet SIGKILLs (Faz 13A graceful shutdown).
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: ollamas
          image: ghcr.io/ecy-coding/ollamas:latest
          ports: [{ containerPort: 3000 }]
          envFrom:
            - configMapRef: { name: ollamas-config }
            - secretRef: { name: ollamas-secrets }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "2", memory: "2Gi" }
          livenessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /api/ready, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ollamas
spec:
  selector: { app: ollamas }
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ollamas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ollamas
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ollamas
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: ollamas }
