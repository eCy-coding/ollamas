replicaCount: 2

image:
  repository: ghcr.io/ecy-coding/ollamas
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 3000

# Plain config (non-secret). MCP_EXPOSE_TIERS=safe because host tools don't run in K8s.
config:
  NODE_ENV: production
  PORT: "3000"
  SAAS_ENFORCE: "1"
  MCP_EXPOSE_TIERS: safe
  LOG_LEVEL: info
  DB_POOL_SIZE: "5"            # pg connections per replica (Faz 12/13)
  SHUTDOWN_GRACE_MS: "10000"   # graceful drain budget on SIGTERM (Faz 13A)

# Secrets — override or source from an external secret manager.
secrets:
  SAAS_ADMIN_TOKEN: change-me
  STRIPE_API_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  REDIS_URL: ""
  # Postgres for multi-replica scale (Faz 12/13). Empty → per-pod sqlite (NOT
  # shared). Set this whenever replicaCount > 1.
  DATABASE_URL: ""

# Run a schema-migration Job before install/upgrade (Faz 13B). Helm hook waits
# for it to complete before rolling Pods. No-op on sqlite.
migration:
  enabled: true

# Drain budget for in-flight requests on SIGTERM (Faz 13A).
terminationGracePeriodSeconds: 30

resources:
  requests: { cpu: 250m, memory: 512Mi }
  limits: { cpu: "2", memory: 2Gi }

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Container-level securityContext (closes semgrep allow-privilege-escalation-no-securitycontext).
# readOnlyRootFilesystem requires the writable emptyDir volumes declared in the deployment
# template; swap the data volume for a PVC for durability across pod restarts.
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault
  readOnlyRootFilesystem: true
  runAsNonRoot: true

# Where the app writes seyir-defteri.jsonl, .master_key, config.json (saas.db in sqlite mode).
# Must match the mountPath of the data emptyDir volume in the deployment template.
missionControlDataDir: /data/llm-mission-control

# Persistent storage for the data directory (holds .master_key + vault-encrypted data).
# Disable only for local dev/CI where pod restarts are acceptable.
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""   # "" = cluster default
