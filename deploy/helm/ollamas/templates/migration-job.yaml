{{- if .Values.migration.enabled }}
# Schema-migration Job (Faz 13B) as a Helm hook: runs before install/upgrade and
# blocks the release until complete, so Pods only roll out after the Postgres
# schema is current. `tsx server.ts --migrate-only` is idempotent + advisory-
# locked (safe to retry / run concurrently). No-op on sqlite.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-migrate
  labels: { app: {{ .Release.Name }}, component: migrate }
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels: { app: {{ .Release.Name }}, component: migrate }
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      volumes:
        # /tmp writable scratch for tsx/Node.js runtime (required with readOnlyRootFilesystem).
        - name: tmp
          emptyDir: {}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["tsx", "server.ts", "--migrate-only"]
          # Container-level securityContext closes semgrep allow-privilege-escalation-no-securitycontext.
          # readOnlyRootFilesystem is safe for --migrate-only: all writes go to Postgres
          # via DATABASE_URL; /tmp covers any Node/tsx temp files.
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          envFrom:
            - configMapRef: { name: {{ .Release.Name }}-config }
            - secretRef: { name: {{ .Release.Name }}-secrets }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
{{- end }}
