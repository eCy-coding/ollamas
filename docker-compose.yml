version: '3.8'

services:
  mission-control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-mission-control
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_NUM_CTX=8192
      # Calibrated (M4 Max benchmark): warm model + 12 P-cores + all layers on Metal GPU
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_THREAD=12
      - OLLAMA_NUM_GPU=999
      # Persist vault + master key on the mounted volume (survives recreate)
      - MISSION_CONTROL_DATA_DIR=/home/nodeapp/.llm-mission-control
      # Host-side macOS terminal bridge (iTerm2 / Terminal.app)
      - HOST_BRIDGE_URL=http://host.docker.internal:7345
      - HOST_BRIDGE_TOKEN=${HOST_BRIDGE_TOKEN}
      # Bridge tools run on the HOST, so this must be the host repo path (the
      # container cwd would be wrong). start.sh exports it; default in .env.
      - HOST_TOOLS_DIR=${HOST_TOOLS_DIR}
      # MCP gateway + tools-as-SaaS (see README). saas.db persists via the volume below.
      - SAAS_ENFORCE=${SAAS_ENFORCE:-0}
      - SAAS_ADMIN_TOKEN=${SAAS_ADMIN_TOKEN:-}
      - MCP_EXPOSE_TIERS=${MCP_EXPOSE_TIERS:-safe,host,privileged}
      - MCP_AUTO_APPLY=${MCP_AUTO_APPLY:-1}
      - STRIPE_API_KEY=${STRIPE_API_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      # v1.3 (Faz 12): unset → node:sqlite on the volume (default, single replica).
      # Set → Postgres async store (multi-replica safe). Start a local pg with the
      # `postgres` profile: `docker compose --profile postgres up -d`.
      - DATABASE_URL=${DATABASE_URL:-}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-5}
    volumes:
      # Bind mount persists both the bridge token and the SaaS store (saas.db).
      # Target = non-root nodeapp's home (Faz 9A).
      - ~/.llm-mission-control:/home/nodeapp/.llm-mission-control
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Deterministic readiness so `docker compose up -d --wait` blocks until /api/health serves.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    # Drain in-flight requests + webhook deliveries on stop/SIGTERM before Docker
    # SIGKILLs (matches server.ts SHUTDOWN_GRACE_MS, Faz 13A).
    stop_grace_period: 30s
    # With `--profile postgres`, run the one-shot migrator before first boot:
    #   docker compose --profile postgres run --rm mission-control tsx server.ts --migrate-only
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # Optional Postgres for the multi-replica async store (v1.3). Opt-in:
  #   docker compose --profile postgres up -d
  # then set DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ollamas
  # (in .env) so mission-control uses it instead of the sqlite volume.
  postgres:
    image: postgres:17
    profiles: ["postgres"]
    container_name: llm-mission-control-pg
    restart: unless-stopped
    # Block setuid/setgid privilege escalation. (read_only omitted: Postgres needs
    # a writable data dir — persisted to the named volume below, not the rootfs.)
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ollamas
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ollamas-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollamas-pgdata:
