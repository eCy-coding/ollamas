version: '3.8'

services:
  mission-control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-mission-control
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_NUM_CTX=8192
    volumes:
      - ~/.llm-mission-control:/root/.llm-mission-control
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
