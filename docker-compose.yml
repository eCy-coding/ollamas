version: '3.8'

services:
  mission-control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-mission-control
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_NUM_CTX=8192
      # Persist vault + master key on the mounted volume (survives recreate)
      - MISSION_CONTROL_DATA_DIR=/root/.llm-mission-control
      # Host-side macOS terminal bridge (iTerm2 / Terminal.app)
      - HOST_BRIDGE_URL=http://host.docker.internal:7345
      - HOST_BRIDGE_TOKEN=${HOST_BRIDGE_TOKEN}
    volumes:
      - ~/.llm-mission-control:/root/.llm-mission-control
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
