name: security
# $0 security scan — Semgrep + Trivy (fs) + Gitleaks. No secrets, no paid tiers.
# CodeQL is free for PUBLIC repos via the separate "CodeQL" default setup (Settings → Security).
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (secrets)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
      - name: Trivy (filesystem vulns + misconfig)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "0"
      - name: Semgrep (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          # auto = registry rulesets; .semgrep/ = repo-local custom guards (no-shell-exec, CWE-78)
          config: >-
            auto
            .semgrep/
        continue-on-error: true
