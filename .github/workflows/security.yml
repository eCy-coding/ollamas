name: security
# $0 security scan — Semgrep + Trivy (fs) + Gitleaks. No secrets, no paid tiers.
# CodeQL is free for PUBLIC repos via the separate "CodeQL" default setup (Settings → Security).
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: security-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (secrets)
        uses: gitleaks/gitleaks-action@v2
      - name: Trivy (filesystem vulns + misconfig)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Semgrep (SAST — CWE-78 no-shell-exec guard, blocking)
        # Direct pinned CLI (the deprecated semgrep-action@v1 silently ran only 1
        # config and ignored line-above nosemgrep). Enforces the repo-local
        # .semgrep/ guard as a blocking gate. `--error` → exit 1 on any finding.
        run: |
          python3 -m pip install --quiet semgrep==1.157.0
          semgrep scan --config .semgrep/ --error --severity ERROR .
