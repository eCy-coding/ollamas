# DRAFT — builds per-arch ollamas CLI binaries + a latest.json manifest and
# attaches them to the GitHub release on a vX.Y.Z tag. Wired, not auto-run: it
# fires only when the maintainer pushes a tag (outward-facing, account-scoped).
# Consumers then `ollamas update --manifest <release latest.json url>`.
#
# This draft builds via Bun (build:binary). The Node-SEA path (v12, `build:sea`) is
# the canonical alternative — swap the `setup-bun` step for `actions/setup-node`
# (>= 20) + `npm i -D postject` and run `npm run build:sea`; both emit the same
# `dist/ollamas-<target>` name, so the checksum/upload steps are unchanged.
name: release-binary

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # gh release upload

jobs:
  binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Node-SEA path: Bun --compile produces a binary that throws "No such built-in
      # module: node:sea" at runtime (cli/index.ts imports node:sea for the SEA launch
      # guard; Bun doesn't implement it). node:sea (isSea) needs Node >= 21 — use 24 (host).
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build:sea
      - name: checksum
        run: shasum -a 256 "dist/ollamas-${{ matrix.target }}" | awk '{print $1}' > "dist/ollamas-${{ matrix.target }}.sha256"
      # Detached-sign the binary with minisign (cli/sign-release.sh). The signing key
      # lives ONLY in the MINISIGN_SECKEY repo secret — no key is committed. The step
      # NO-OPs gracefully when the secret is absent (forks / PRs without the key) so the
      # workflow still builds + uploads an unsigned binary. When present, it writes the
      # secret to a temp keyfile, signs, derives the keyId, and emits it for the manifest.
      - name: sign binary (minisign)
        id: sign
        env:
          SECKEY_CONTENT: ${{ secrets.MINISIGN_SECKEY }}
          TARGET: ${{ matrix.target }}
        run: |
          if [ -z "${SECKEY_CONTENT:-}" ]; then
            echo "MINISIGN_SECKEY secret absent — skipping signing (unsigned release)." >&2
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          command -v minisign >/dev/null 2>&1 || {
            if [ "$RUNNER_OS" = "macOS" ]; then brew install minisign;
            else sudo apt-get update -y && sudo apt-get install -y minisign; fi
          }
          KEYFILE="$(mktemp)"
          trap 'rm -f "$KEYFILE"' EXIT
          printf '%s\n' "$SECKEY_CONTENT" > "$KEYFILE"
          OUT="$(MINISIGN_SECKEY="$KEYFILE" bash cli/sign-release.sh "dist/ollamas-${TARGET}")"
          KEY_ID="$(printf '%s\n' "$OUT" | sed -n 's/^OLLAMAS_KEY_ID=//p')"
          echo "signed=true" >> "$GITHUB_OUTPUT"
          echo "key_id=${KEY_ID}" >> "$GITHUB_OUTPUT"
      - name: upload binary + checksum (+ minisig if signed)
        if: startsWith(github.ref, 'refs/tags/') # tag-only; workflow_dispatch = build verify (no release to upload to)
        # ref_name + target go through env vars (not ${{ }} interpolation in the
        # shell) so a crafted tag name can't inject shell commands here.
        run: |
          EXTRA=""
          if [ -f "dist/ollamas-$TARGET.minisig" ]; then
            EXTRA="dist/ollamas-$TARGET.minisig"
            # Sidecar so the cross-job manifest builder can embed keyId in latest.json.
            printf '%s' "$KEY_ID" > "dist/ollamas-$TARGET.keyid"
            EXTRA="$EXTRA dist/ollamas-$TARGET.keyid"
          fi
          gh release upload "$REF" "dist/ollamas-$TARGET" "dist/ollamas-$TARGET.sha256" $EXTRA --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          KEY_ID: ${{ steps.sign.outputs.key_id }}

  manifest:
    needs: binary
    if: startsWith(github.ref, 'refs/tags/') # tag-only (aggregates uploaded release assets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build latest.json from uploaded checksums
        run: |
          VER="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          ASSETS=""
          for t in darwin-arm64 linux-x64; do
            SHA="$(gh release download "${GITHUB_REF_NAME}" -p "ollamas-${t}.sha256" -O - 2>/dev/null || echo "")"
            [ -n "$SHA" ] || continue
            # Optional minisig/keyId — present only when the binary job had the secret.
            # minisig is embedded as the URL of the uploaded .minisig (manifest.ts
            # accepts either the sig text body OR a URL to fetch it).
            SIG_EXTRA=""
            if gh release download "${GITHUB_REF_NAME}" -p "ollamas-${t}.minisig" -O /dev/null 2>/dev/null; then
              KID="$(gh release download "${GITHUB_REF_NAME}" -p "ollamas-${t}.keyid" -O - 2>/dev/null || echo "")"
              SIG_EXTRA=",\"minisig\":\"${BASE}/ollamas-${t}.minisig\""
              [ -n "$KID" ] && SIG_EXTRA="${SIG_EXTRA},\"keyId\":\"${KID}\""
            fi
            ASSETS="${ASSETS}{\"target\":\"${t}\",\"url\":\"${BASE}/ollamas-${t}\",\"sha256\":\"${SHA}\"${SIG_EXTRA}},"
          done
          printf '{"version":"%s","assets":[%s]}\n' "$VER" "${ASSETS%,}" > latest.json
          cat latest.json
          gh release upload "${GITHUB_REF_NAME}" latest.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
