name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
        db: [sqlite, postgres]
    # Postgres service is always provisioned but only exercised when
    # matrix.db=postgres (DATABASE_URL set below). For sqlite runs it sits idle —
    # cheap, keeps the matrix uniform. Both dialects run the same vitest suite.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ollamas_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Empty → node:sqlite default; set → pg adapter (multi-replica path).
      DATABASE_URL: ${{ matrix.db == 'postgres' && 'postgresql://postgres:postgres@localhost:5432/ollamas_ci' || '' }}
      DB_POOL_SIZE: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test (${{ matrix.db }})
        run: npx vitest run
      - name: Build
        run: npx vite build

  # perf-smoke (v1.29.2): self-contained p95 latency budget gate. Boots the exported app
  # IN-PROCESS (OLLAMAS_NO_AUTOBOOT=1 — no vite/store boot, no model inference, no GPU) and
  # hammers one static endpoint (/api/openapi.json). Deterministic + network-free: never
  # touches a live model or DB, so it is safe on a plain ubuntu runner. Gates on p95 vs
  # scripts/perf-budget.json (exit 1 over budget) and uploads the measured table as an artifact.
  perf:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: perf-smoke (p95 budget gate)
        run: npx tsx scripts/perf-smoke.ts | tee perf-smoke-report.txt
      - name: Upload perf report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-report
          path: perf-smoke-report.txt
          if-no-files-found: warn
