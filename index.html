<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d12" />
    <!-- vF4 — iOS web-clip / standalone PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ollamas" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/pwa-icon.svg" />
    <title>ollamas — LLM Mission Control</title>
    <!-- vF9 — no-flash: set data-theme + lang before first paint (FOUC guard) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('ollamas.theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.dataset.theme = t;
          var l = localStorage.getItem('ollamas.locale');
          if (l === 'tr' || l === 'en') document.documentElement.lang = l;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
